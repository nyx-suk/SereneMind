version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: mindcare_postgres
    environment:
      POSTGRES_USER: mindcare_user
      POSTGRES_PASSWORD: mindcare_pass
      POSTGRES_DB: mindcare_db
    ports:
      - "5432:5432"
    volumes:
      - mindcare_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  mindcare_data: